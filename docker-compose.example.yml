# Example compose file — copy to docker-compose.yml and adjust paths.
services:
  librinode:
    build: . # from a repo checkout; or swap in a published image (see below)
    # image: ghcr.io/obstruct-exit-emit/librinode:0.9.0-rc.3
    # Published per release on GHCR; :latest arrives with the first stable
    # (non-rc) release. Pre-release builds are pullable by their version tag.
    container_name: librinode
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - /path/to/ebooks:/media/ebooks
      - /path/to/audiobooks:/media/audiobooks
      - /path/to/manga:/media/manga
      - /path/to/comics:/media/comics
      - /path/to/magazines:/media/magazines
      - /path/to/downloads:/downloads # same mount your download client uses
    ports:
      - "7845:7845"
    restart: unless-stopped
